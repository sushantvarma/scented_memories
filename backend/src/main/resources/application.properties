# ── Server ───────────────────────────────────────────────────────────────────
# Render injects PORT at runtime; fall back to 8080 for local runs
server.port=${PORT:8080}

# ── DataSource (Neon PostgreSQL via Neon connection pooler) ──────────────────
# DATABASE_URL must be set on Render in JDBC format, including SSL params:
#   jdbc:postgresql://<pooler-host>/<dbname>?sslmode=require&channel_binding=require
#
# Use the *pooler* endpoint (ep-xxx-pooler.region.aws.neon.tech), not the
# direct endpoint, so connections go through PgBouncer and stay within the
# free-tier limit of 5 concurrent connections.
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Credentials are embedded in DATABASE_URL for Neon.
# DB_USERNAME / DB_PASSWORD are kept as optional overrides for environments
# that supply credentials separately (e.g. some CI setups).
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}

# ── HikariCP connection pool ─────────────────────────────────────────────────
# Neon free tier allows ~100 connections total; PgBouncer pooler handles
# multiplexing. Keep the JVM pool small to avoid exhausting pooler slots.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# How long to wait for a connection from the pool before throwing (ms)
spring.datasource.hikari.connection-timeout=30000

# Drop idle connections after 10 minutes (Neon recycles idle connections
# aggressively; this prevents stale-connection errors)
spring.datasource.hikari.idle-timeout=600000

# Max lifetime of any connection in the pool — rotate before Neon closes it
spring.datasource.hikari.max-lifetime=1800000

# Send a keepalive ping every 60 s to prevent the pooler from dropping
# connections that are open but idle between requests
spring.datasource.hikari.keepalive-time=60000

# Validate connection health before handing it to the application
spring.datasource.hikari.connection-test-query=SELECT 1

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
# validate — Hibernate checks that entity mappings match the DB schema on
# startup but makes NO changes. Flyway owns all DDL.
spring.jpa.hibernate.ddl-auto=validate

# Never log SQL in production — avoids leaking query structure in logs
spring.jpa.show-sql=false

# Explicit dialect — avoids auto-detection overhead on every startup
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Disable OSIV — keeps DB connections scoped to the service layer only
spring.jpa.open-in-view=false

# ── Flyway ───────────────────────────────────────────────────────────────────
# Flyway runs versioned migrations from db/migration on every startup.
# baseline-on-migrate=false means Flyway expects a clean schema history table;
# set to true only if migrating a pre-existing database.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# ── JWT ──────────────────────────────────────────────────────────────────────
# JWT_SECRET must be set on Render — minimum 32 characters, random.
# Expiry: 7 days in milliseconds (7 * 24 * 60 * 60 * 1000)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=604800000

# ── CORS ─────────────────────────────────────────────────────────────────────
# Set FRONTEND_URL on Render once the Vercel deployment URL is known.
# Example: FRONTEND_URL=https://scented-memories.vercel.app
# Defaults to * for the initial cold deployment — tighten immediately after
# the frontend URL is confirmed.
app.cors.allowed-origins=${FRONTEND_URL:*}

# ── Logging ──────────────────────────────────────────────────────────────────
# logback-spring.xml handles appender/pattern config.
# These properties control level overrides that can be set via env vars on
# Render without redeploying (e.g. LOGGING_LEVEL_COM_SCENTEDMEMORIES=DEBUG).
logging.level.root=INFO
logging.level.com.scentedmemories=INFO
logging.level.org.flywaydb=INFO
logging.level.com.zaxxer.hikari=INFO
# Ensure logs are not buffered — Render reads stdout line-by-line
spring.output.ansi.enabled=NEVER
