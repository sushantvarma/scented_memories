# ── Server ──────────────────────────────────────────────────────────────────
# Render injects PORT at runtime; fall back to 8080 for local runs
server.port=${PORT:8080}

# ── DataSource (Neon PostgreSQL) ─────────────────────────────────────────────
# Set DATABASE_URL as environment variable on Render:
# jdbc:postgresql://<host>/<db>?sslmode=require
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP — stay within Neon free-tier connection limit
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# ── JWT ───────────────────────────────────────────────────────────────────────
# Set JWT_SECRET as environment variable on Render
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=604800000

# ── CORS ─────────────────────────────────────────────────────────────────────
# Set FRONTEND_URL env var on Render once the Vercel URL is known.
# Defaults to * (all origins) for initial deployment — tighten after frontend is live.
# Example: FRONTEND_URL=https://your-app.vercel.app
app.cors.allowed-origins=${FRONTEND_URL:*}
